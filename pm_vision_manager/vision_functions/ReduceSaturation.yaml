function_name: "Reduce Saturation"
description: "Reduces saturation for specific color ranges to tone down dominant colors in an image.\n\nConverts BGR to HSV, reduces saturation for pixels whose hue falls within the specified range [HueMin, HueMax] by dividing their saturation value by f_reduce_s, then converts back to BGR.\n\nUseful for images with a dominating color that overwhelms other details.\n\nDependencies:\n- Input should be a color image (BGR format)\n- Hue range is 0-180 in OpenCV (0=red, 30=yellow, 60=green, 105=blue)\n- Saturation reduction only affects specified hue range, leaving other colors unchanged"
# image: "vision_functions_example_imgs/ReduceSaturation.jpg"
function_category: "Image Processing"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Minimum Hue"
    description: "Type: int (0 - 180).\nLower bound of the hue range to target.\nHue represents color in HSV color space.\n0 = red, 30 = yellow, 60 = green, 105 = blue.\nDefault: 0"
    type: "unsigned_int"
    min_val: 0
    max_val: 180

  - param_name: "Maximum Hue"
    description: "Type: int (0 - 180).\nUpper bound of the hue range to target.\nMust be greater than or equal to Minimum Hue.\nDefault: 180"
    type: "unsigned_int"
    min_val: 0
    max_val: 180
    
  - param_name: "Saturation Reduction Factor"
    description: "Type: int (1 - 20).\nFactor by which to reduce saturation.\nFormula: new_saturation = old_saturation / f_reduce_s\nHigher values = stronger desaturation (more gray).\nLower values = subtle reduction.\nDefault: 2 (half saturation)"
    type: "unsigned_int"
    min_val: 1
    max_val: 20
