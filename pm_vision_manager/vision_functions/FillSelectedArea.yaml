function_name: "Fill Selected Area"
description: "Fills only contours within a specified size range to produce a clean binary mask.\n\nDetects contours in a binary image, filters them by area (minimum and maximum), and fills only those that meet the criteria.\n\nUseful for removing small noise or excluding large irrelevant regions.\n\nDependencies:\n- Input should be a binary (black and white) image\n- Area can be calculated as percentage of full image or ROI"
# image: "vision_functions_example_imgs/FillSelectedArea.jpg"
function_category: "Image Processing"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Contour Retrieval Mode"
    description: "Type: dropdown.\nHow contours are extracted from the image.\nRETR_EXTERNAL: Only outermost contours (recommended).\nRETR_LIST: All contours without hierarchy.\nRETR_CCOMP: Two-level hierarchy (outer and holes).\nRETR_TREE: Full hierarchy (all contour relationships)."
    type: "string_list"
    values: 
      - "RETR_LIST"
      - "RETR_EXTERNAL"
      - "RETR_CCOMP"
      - "RETR_TREE"

  - param_name: "Use ROI Percentage"
    description: "Type: bool.\nIf enabled, min and max area are calculated as percentages of the ROI size.\nIf disabled, areas are percentages of the full image size.\nDefault: False"
    type: "bool"
    default: False

  - param_name: "Contour Approximation Method"
    description: "Type: dropdown.\nHow contours are compressed.\nCHAIN_APPROX_SIMPLE: Compresses segments, leaves only endpoints (most efficient, recommended).\nCHAIN_APPROX_NONE: Stores all contour points (slowest).\nCHAIN_APPROX_TC89_L1: Teh-Chin approximation (moderate).\nCHAIN_APPROX_TC89_KCOS: Teh-Chin approximation (moderate)."
    type: "string_list"
    values: 
      - "CHAIN_APPROX_SIMPLE"
      - "CHAIN_APPROX_NONE"
      - "CHAIN_APPROX_TC89_L1"
      - "CHAIN_APPROX_TC89_KCOS"

  - param_name: "Maximum Area"
    description: "Type: float (0.1 - 100.0).\nMaximum contour area as percentage of selected reference (image or ROI).\nContours larger than this are NOT filled.\nDefault: 100.0 (fill all sizes)"
    type: "float"
    min_val: 0.1
    max_val: 100.0
    default: 100.0
    
  - param_name: "Minimum Area"
    description: "Type: float (0.1 - 100.0).\nMinimum contour area as percentage of selected reference (image or ROI).\nContours smaller than this are NOT filled (removes noise).\nDefault: 0.1 (fill almost everything)"
    type: "float"
    min_val: 0.1
    max_val: 100.0
    default: 0.1
