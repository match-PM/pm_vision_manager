function_name: "Hough Circles"
description: "Detects circles in a grayscale image using the Hough Gradient method.\n\nFinds circular objects by detecting edges and voting on potential center locations and radii.\n\nOutputs center coordinates (X, Y) and radius for each detected circle.\n\nDependencies:\n- Input should be a grayscale image (use BGR2GRAY first if needed)\n- Works best with clear, well-defined circular edges\n- Recommend applying blur or edge detection beforehand for noisy images"
# image: "vision_functions_example_imgs/HoughCircles.jpg"
function_category: "Machine Vision"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Draw Detected Circles"
    description: "Type: bool.\nDraw detected circles on the image for visualization.\nHas no effect on function output values."
    type: "bool"

  - param_name: "Detection Method"
    description: "Type: dropdown.\nAlgorithm for circle detection.\nHOUGH_GRADIENT: Standard Hough Gradient method (only option currently)."
    type: "string_list"
    values: 
      - "HOUGH_GRADIENT"

  - param_name: "Accumulator Resolution"
    description: "Type: float (1.0 - no limit).\nInverse ratio of accumulator resolution to image resolution.\ndp=1: Same resolution as image.\ndp=2: Accumulator half the size (faster, less accurate).\nLarger values = faster but may miss circles."
    type: "float"
    min_val: 1
    max_val: "inf"

  - param_name: "Minimum Distance"
    description: "Type: int (1 - no limit).\nMinimum distance between detected circle centers [pixels].\nSmaller values may detect duplicate circles.\nLarger values ensure distinct circles."
    type: "unsigned_int"
    min_val: 1
    max_val: "inf"

  - param_name: "Edge Detection Threshold (High)"
    description: "Type: int (1 - no limit).\nUpper threshold for Canny edge detector.\nHigher values detect only strong edges.\nLower values detect more edges (may include noise).\nDefault: 10"
    type: "unsigned_int"
    min_val: 1
    max_val: "inf"
    default: 10

  - param_name: "Center Detection Threshold"
    description: "Type: int (1 - no limit).\nThreshold for center detection in the accumulator.\nLower values detect more potential circles (may include false positives).\nHigher values detect only strong circles.\nDefault: 20"
    type: "unsigned_int"
    min_val: 1
    max_val: "inf"
    default: 20

  - param_name: "Minimum Radius"
    description: "Type: float (0.0 - no limit).\nSmallest circle radius to detect [micrometers].\nDefault: 1000.0"
    type: "float"
    min_val: 0.0
    max_val: "inf"
    default: 1000.0

  - param_name: "Maximum Radius"
    description: "Type: float (0.001 - no limit).\nLargest circle radius to detect [micrometers].\nDefault: 2000.0"
    type: "float"
    min_val: 0.001
    max_val: "inf"
    default: 2000.0
