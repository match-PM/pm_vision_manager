function_name: "Draw Coordinate System"
description: "Draws a coordinate system (X and Y axes with origin) overlay on the image for reference or calibration purposes.\n\nUseful for visualizing spatial relationships and verifying calibration results.\n\nDependencies:\n- Works on any image type\n- Overlay does not modify the original image content\n- Origin position and scale may be affected by camera calibration"
# image: "vision_functions_example_imgs/Draw_CS.jpg"
function_category: "Image Tools"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"
