function_name: "Vision OK Override"
description: "Overrides the vision okay boolean status.\n\nUseful as a default function for new vision pipelines to fail by default, or to force pass/fail results for testing.\n\nDependencies:\n- Affects the overall pipeline pass/fail status\n- Can be used to force failure when no other conditions exist\n- Helpful for debugging and validation"
# image: "vision_functions_example_imgs/VisionOkOverride.jpg"
function_category: "Image Tools"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Override Vision OK"
    description: "Type: bool.\nForce the vision okay status to this value.\ntrue = Force pass (vision OK).\nfalse = Force fail (vision not OK)."
    type: "bool"
