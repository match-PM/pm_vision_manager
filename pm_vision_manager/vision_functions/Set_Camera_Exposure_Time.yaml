function_name: "Set Camera Exposure Time"
description: "Sets the exposure time of the camera to control how much light is captured.\n\nHigher exposure = brighter image (more light captured).\nLower exposure = darker image (less light captured).\n\nUseful for adjusting image brightness in different lighting conditions.\n\nDependencies:\n- May not be available for all cameras\n- Has no effect in cross validation mode\n- Exposure time set as percentage of maximum"
# image: "vision_functions_example_imgs/Set_Camera_Exposure_Time.jpg"
function_category: "Camera Tools"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Exposure Time"
    description: "Type: float (0.0 - 100.0).\nCamera exposure time as percentage of maximum.\n0% = minimum exposure (darkest).\n100% = maximum exposure (brightest).\nAdjust based on lighting conditions."
    type: "float"
    min_val: 0.0
    max_val: 100.0
