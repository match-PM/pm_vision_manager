function_name: "Dilation"
description: "Enlarges bright regions and fills small holes in a binary or grayscale image using morphological dilation.\n\nWorks by sliding a square kernel over the image and setting the output pixel to the maximum value within the kernel.\n\nDependencies:\n- Works on binary (black and white) or grayscale images\n- Opposite of Erosion (dilate then erode = closing, fills holes)\n- Erode then dilate = opening, removes small noise"
# image: "vision_functions_example_imgs/Dilation.jpg"
function_category: "Image Processing"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Kernel Size"
    description: "Type: kernel (1 - 10000).\nSize of the square structuring element.\nLarger kernels create stronger dilation effects.\nMust be an odd number."
    type: "kernel"
    min_val: 1
    max_val: 10000

  - param_name: "Iterations"
    description: "Type: int (1 - 255).\nNumber of times to apply the dilation operation.\nMultiple iterations increase the effect.\nEach iteration applies the kernel again to the previous result."
    type: "unsigned_int"
    min_val: 1
    max_val: 255
