function_name: "Fill Area"
description: "Fills all detected contours in a binary image and connects white pixel regions that touch the image borders.\n\nDetects contours, fills them with white, adds a clean black border, and optionally visualizes the contours.\n\nUseful for cleaning up binary images and preparing them for further analysis like circle detection or measurements.\n\nDependencies:\n- Input should be a binary (black and white) grayscale image\n- Best used after thresholding or color extraction\n- Regions touching borders will be connected to ensure complete contours"
# image: "vision_functions_example_imgs/FillArea.jpg"
function_category: "Image Processing"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Draw Contours"
    description: "Type: bool.\nDraw detected contours on the visualization canvas.\nUseful for debugging and validating contour detection."
    type: "bool"

  - param_name: "Contour Retrieval Mode"
    description: "Type: dropdown.\nHow contours are extracted from the image.\nRETR_EXTERNAL: Only outermost contours (recommended for filled areas).\nRETR_LIST: All contours without hierarchy (faster).\nRETR_CCOMP: Two-level hierarchy (outer and holes).\nRETR_TREE: Full hierarchy (all contour relationships)."
    type: "string_list"
    values: 
      - "RETR_EXTERNAL"
      - "RETR_CCOMP"
      - "RETR_LIST"
      - "RETR_TREE"

  - param_name: "Contour Approximation Method"
    description: "Type: dropdown.\nHow contours are compressed.\nCHAIN_APPROX_SIMPLE: Compresses horizontal/vertical/diagonal segments (most efficient).\nCHAIN_APPROX_NONE: Stores all contour points (slowest, most memory).\nCHAIN_APPROX_TC89_L1: Teh-Chin chain approximation (moderate compression).\nCHAIN_APPROX_TC89_KCOS: Teh-Chin chain approximation (moderate compression)."
    type: "string_list"
    values: 
      - "CHAIN_APPROX_SIMPLE"
      - "CHAIN_APPROX_NONE"
      - "CHAIN_APPROX_TC89_L1"
      - "CHAIN_APPROX_TC89_KCOS"

  - param_name: "Fill Top Border Gap"
    description: "Type: bool.\nFill white pixel gaps along the top image border before contour detection.\nEnsures regions touching the top edge are connected."
    type: "bool"

  - param_name: "Fill Left Border Gap"
    description: "Type: bool.\nFill white pixel gaps along the left image border before contour detection.\nEnsures regions touching the left edge are connected."
    type: "bool"

  - param_name: "Fill Bottom Border Gap"
    description: "Type: bool.\nFill white pixel gaps along the bottom image border before contour detection.\nEnsures regions touching the bottom edge are connected."
    type: "bool"

  - param_name: "Fill Right Border Gap"
    description: "Type: bool.\nFill white pixel gaps along the right image border before contour detection.\nEnsures regions touching the right edge are connected."
    type: "bool"
