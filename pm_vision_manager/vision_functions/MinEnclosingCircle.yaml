function_name: "Minimum Enclosing Circle"
description: "Finds the smallest circle that completely encloses each contour in a binary image.\n\nReturns center coordinates (X, Y) and radius for each detected circle.\n\nUseful for measuring object sizes, finding bounding circles, and circularity analysis.\n\nDependencies:\n- Input should be a binary image with clear contours\n- Each contour gets its own enclosing circle\n- Works best with filled shapes or continuous contours"
# image: "vision_functions_example_imgs/MinEnclosingCircle.jpg"
function_category: "Machine Vision"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Draw Enclosing Circles"
    description: "Type: bool.\nDraw the minimum enclosing circles on the image for visualization.\nHas no effect on function output values."
    type: "bool"

  - param_name: "Line Thickness"
    description: "Type: int (1 - 100).\nThickness of drawn circle outlines in pixels.\nOnly applies when Draw Enclosing Circles is enabled.\nDefault: 5"
    type: "unsigned_int"
    min_val: 1
    max_val: 100
    default: 5
    
  - param_name: "Contour Retrieval Mode"
    description: "Type: dropdown.\nHow contours are extracted from the image.\nRETR_EXTERNAL: Only outermost contours (recommended for enclosing circles)."
    type: "string_list"
    values: 
      - "RETR_EXTERNAL"

  - param_name: "Contour Approximation Method"
    description: "Type: dropdown.\nHow contours are compressed.\nCHAIN_APPROX_SIMPLE: Compresses segments, leaves only endpoints (most efficient, recommended)."
    type: "string_list"
    values: 
      - "CHAIN_APPROX_SIMPLE"
