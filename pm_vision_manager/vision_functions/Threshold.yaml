function_name: "Threshold"
description: "Converts a grayscale image to a binary image by applying a global threshold.\n\nPixels above the threshold value are set to maximum value, others are set to zero.\n\nOutputs a binary image useful for object detection, segmentation, and feature extraction.\n\nDependencies:\n- Input should be a grayscale image (use BGR2GRAY first if needed)\n- Works best with good contrast between foreground and background\n- Use adaptive threshold for uneven lighting conditions"
# image: "vision_functions_example_imgs/Threshold.jpg"
function_category: "Image Processing"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Threshold Value"
    description: "Type: int (0 - 255).\nCutoff value for pixel classification.\nPixels above this value become maxval.\nPixels below or equal become 0.\nTypical range: 0 (all white) to 255 (all black)."
    type: "unsigned_int"
    min_val: 0
    max_val: 255

  - param_name: "Maximum Value"
    description: "Type: int (255 only).\nValue assigned to pixels that pass the threshold.\nFixed at 255 (white) for binary output."
    type: "unsigned_int"
    min_val: 255
    max_val: 255

  - param_name: "Threshold Type"
    description: "Type: dropdown.\nMethod for applying threshold.\nTHRESH_BINARY: Pixels > thresh become maxval, else 0 (standard).\nTHRESH_BINARY_INV: Pixels > thresh become 0, else maxval (inverted).\nTHRESH_TRUNC: Pixels > thresh become thresh, others unchanged.\nTHRESH_TOZERO: Pixels > thresh unchanged, others become 0.\nTHRESH_TOZERO_INV: Pixels > thresh become 0, others unchanged.\nTHRESH_OTSU: Automatically determines optimal threshold (ignores thresh param)."
    type: "string_list"
    values: 
      - "THRESH_BINARY"
      - "THRESH_BINARY_INV"
      - "THRESH_TRUNC"
      - "THRESH_TOZERO"
      - "THRESH_TOZERO_INV"
      - "THRESH_OTSU"
