function_name: "Circle Detection"
description: "Detects circles in a binary image using contour detection and least-squares fitting.\n\nOutputs circle center coordinates and radius measurements.\n\nDependencies:\n- Input MUST be a binary image (black and white)\n- Apply morphological opening or closing BEFORE this function to detach circles from image borders\n- Circles touching the image border will cause fitting failures\n\nNote: Set minRadius and maxRadius wide at first, then narrow down for precise results."
# image: "vision_functions_example_imgs/CircleDetection.jpg"
function_category: "Machine Vision"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"
    default: true

  - param_name: "Fitting Method"
    description: "Type: dropdown.\nAlgorithm for circle fitting.\nstandardLSQ: Standard least squares.\nhyperLSQ: Hyperaccurate least squares.\nriemannSWFLa: Riemannian SWF La.\nprattSVD: Pratt SVD method.\ntaubinSVD: Taubin SVD method.\nhyperSVD: Hyper SVD method.\nkmh: KMH method."
    type: "string_list"
    values: 
      - "standardLSQ"
      - "hyperLSQ"
      - "riemannSWFLa"
      - "prattSVD"
      - "taubinSVD"
      - "hyperSVD"
      - "kmh"

  - param_name: "Minimum Radius"
    description: "Type: float (0.0 - no limit).\nSmallest circle radius to detect [micrometers]."
    type: "float"
    min_val: 0.0
    max_val: "inf"

  - param_name: "Maximum Radius"
    description: "Type: float (0.001 - no limit).\nLargest circle radius to detect [micrometers]."
    type: "float"
    min_val: 0.001
    max_val: "inf"

  - param_name: "Draw Detected Circles"
    description: "Type: bool.\nDraw detected circles on the image for visualization.\nHas no effect on function output values."
    type: "bool"
    default: true

  - param_name: "Fit Single Circle"
    description: "Type: bool.\nUse all points in the image to fit a single circle.\nEnable when only one circle is expected in the image."
    type: "bool"
    default: false

  - param_name: "Contour Retrieval Mode"
    description: "Type: dropdown.\nHow contours are extracted from the binary image.\nRETR_EXTERNAL: Only outermost contours (best for single circles).\nRETR_LIST: All contours without hierarchy.\nRETR_CCOMP: Two-level hierarchy (outer and holes).\nRETR_TREE: Full hierarchy (all contour relationships)."
    type: "string_list"
    values: 
      - "RETR_EXTERNAL"
      - "RETR_LIST"
      - "RETR_CCOMP"
      - "RETR_TREE"
    default: "RETR_EXTERNAL"
