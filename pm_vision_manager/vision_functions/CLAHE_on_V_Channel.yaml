function_name: "CLAHE on V Channel"
description: "Enhances local contrast by applying CLAHE (Contrast Limited Adaptive Histogram Equalization) to the Value channel of the HSV color space.\n\nConverts BGR → HSV, applies CLAHE to the V (brightness) channel, then converts back to BGR.\nHelps improve edge detection and feature visibility in unevenly lit images.\n\nDependencies:\n- Works best on color images\n- Recommended before edge detection or thresholding\n- The V channel represents brightness, so color information is preserved"
# image: "vision_functions_example_imgs/CLAHE_on_V_Channel.jpg"
function_category: "Image Processing"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Clip Limit"
    description: "Type: float (1.0 - 10.0, supports decimals).\nThreshold for contrast limiting.\nHigher values = more contrast enhancement but may amplify noise.\nLower values = more natural look with less noise.\nTypical range: 2.0 - 4.0."
    type: "float"
    min_val: 1.0
    max_val: 10.0

  - param_name: "Tile Grid Size (Height)"
    description: "Type: int (2 - 30).\nNumber of tiles in the vertical direction (M).\nImage is divided into M x N tiles.\nSmaller tiles = more local adaptation (faster).\nLarger tiles = smoother results (slower)."
    type: "unsigned_int"
    min_val: 2
    max_val: 30
    
  - param_name: "Tile Grid Size (Width)"
    description: "Type: int (2 - 30).\nNumber of tiles in the horizontal direction (N).\nImage is divided into M x N tiles.\nSmaller tiles = more local adaptation (faster).\nLarger tiles = smoother results (slower)."
    type: "unsigned_int"
    min_val: 2
    max_val: 30
