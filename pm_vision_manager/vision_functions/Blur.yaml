function_name: "Blur"
description: "Applies a blur filter to the image to reduce noise and smooth details.\n\nSupports Gaussian, average (box), and median blur types with adjustable kernel size and sigma."
# image: "vision_functions_example_imgs/Blur.jpg"
function_category: "Image Processing"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Kernel Size"
    description: "Type: kernel (1 - 10000).\nSize of the blur kernel.\nLarger values create stronger blur but take more time to compute.\nMust be an odd number."
    type: "kernel"
    min_val: 1
    max_val: 10000

  - param_name: "Gaussian Standard Deviation"
    description: "Type: int (1 - 10).\nStandard deviation of the Gaussian distribution in X and Y directions.\nHigher values create smoother blur.\nOnly used for Gaussian blur type."
    type: "unsigned_int"
    min_val: 1
    max_val: 10
    
  - param_name: "Blur Type"
    description: "Type: dropdown.\nAlgorithm used for blurring.\nGaussianBlur: Smooth, natural blur using Gaussian distribution.\nBlur: Simple average of neighboring pixels (box blur).\nmedianBlur: Replaces each pixel with median of neighbors (good for salt-and-pepper noise)."
    type: "string_list"
    values: 
      - "GaussianBlur"
      - "Blur"
      - "medianBlur"
