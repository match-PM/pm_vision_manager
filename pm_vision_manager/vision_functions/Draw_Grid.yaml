function_name: "Draw Grid"
description: "Overlays a regular grid on the image with adjustable spacing between grid lines.\n\nUseful for calibration, measurement reference, and spatial orientation.\n\nDependencies:\n- Works on any image type\n- Overlay does not modify the original image content\n- Grid spacing is in actual world units (micrometers) based on calibration"
# image: "vision_functions_example_imgs/Draw_Grid.jpg"
function_category: "Image Tools"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Grid Spacing"
    description: "Type: int (100 - no limit).\nDistance between grid lines [micrometers].\nSmaller values create denser grids.\nLarger values create sparser grids.\nDefault: 200"
    type: "unsigned_int"
    min_val: 100
    max_val: "inf"
    default: 200
