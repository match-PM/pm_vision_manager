function_name: "Image Sharpness"
description: "Calculates image sharpness/focus quality using various computational methods.\n\nOutputs a numerical score where higher values indicate sharper (more in-focus) images.\n\nUseful for autofocus systems, quality control, and detecting blurry images.\n\nDependencies:\n- Works on grayscale images (converts automatically if needed)\n- Different methods may produce different score ranges\n- Compare scores relative to each other, not as absolute values"
# image: "vision_functions_example_imgs/ImageSharpness.jpg"
function_category: "Image Analysis"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Sharpness Method"
    description: "Type: dropdown.\nAlgorithm for calculating sharpness.\nLaplacian Var: Variance of Laplacian (fast, good general purpose).\nTenengrad: Tenengrad gradient magnitude (robust, good for noisy images).\nBrenner: Brenner gradient (very fast, good for real-time).\nFFT-Based: Frequency domain analysis (slowest, most accurate)."
    type: "string_list"
    values: 
      - "Laplacian Var"
      - "Tenengrad"
      - "Brenner"
      - "FFT-Based"
