function_name: "Morphology Gradient"
description: "Performs morphological gradient operation (dilation minus erosion) to highlight edge transitions in a binary image.\n\nOutputs the edges of objects by showing the difference between dilated and eroded versions of the image.\n\nUseful for finding object boundaries, edge detection, and extracting contour outlines.\n\nDependencies:\n- Input MUST be a binary (black and white) image\n- Output is a binary image showing object edges/boundaries\n- Kernel size controls the thickness of detected edges"
# image: "vision_functions_example_imgs/Morphology_Ex_Gradient.jpg"
function_category: "Image Processing"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Kernel Size"
    description: "Type: kernel (1 - 10000).\nSize of the square structuring element.\nMust be an odd number.\nLarger values produce thicker edges.\nSmaller values produce thinner, more precise edges.\nRecommended start: 3 or 5."
    type: "kernel"
    min_val: 1
    max_val: 10000
