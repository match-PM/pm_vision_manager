function_name: "Set Coaxial Light Bool (On/Off)"
description: "Turns the coaxial light of the camera on or off.\n\nCoaxial lighting provides even, shadow-free illumination from the same direction as the camera view.\n\nUseful for inspecting shiny or reflective surfaces, PCBs, wafers, and flat objects.\n\nDependencies:\n- May not be available for all cameras or lighting setups\n- Has no effect in cross validation mode\n- Use Set Coaxial Light for intensity control if available"
# image: "vision_functions_example_imgs/SetCoAxLightBool.jpg"
function_category: "Camera Tools"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Light State"
    description: "Type: bool.\nTurn coaxial light on or off.\ntrue = Light ON\nfalse = Light OFF"
    type: "bool"
