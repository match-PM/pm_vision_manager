function_name: "Corner Detection"
description: "Detects the intersection point (corner) of two dominant lines selected from specified image edges.\n\nUses Hough-based line detection and computes the intersection of two lines.\n\nOutputs the corner coordinates (X, Y) in micrometers.\n\nDependencies:\n- Input MUST be a binary image (black and white)\n- Lines should be clearly visible (use edge detection like Canny first if needed)\n- Works best when lines are relatively straight and form a right angle"
# image: "vision_functions_example_imgs/CornerDetection.jpg"
function_category: "Machine Vision"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"
    default: true

  - param_name: "First Line Edge"
    description: "Type: dropdown.\nWhich edge of the image to use for detecting the first line.\ntop: Upper edge\bottom: Lower edge\nleft: Left edge\nright: Right edge"
    type: "string_list"
    default: "top"
    values:
      - "top"
      - "bottom"
      - "left"
      - "right"

  - param_name: "First Line Minimum Length"
    description: "Type: float (0.1 - no limit).\nMinimum length of the first line to detect [micrometers].\nLower values detect shorter lines.\nHigher values ignore short segments (reduces false detections)."
    type: "float"
    min_val: 0.1
    max_val: "inf"
    default: 0.1

  - param_name: "Second Line Edge"
    description: "Type: dropdown.\nWhich edge of the image to use for detecting the second line.\ntop: Upper edge\nbottom: Lower edge\nleft: Left edge\nright: Right edge"
    type: "string_list"
    default: "top"
    values:
      - "top"
      - "bottom"
      - "left"
      - "right"

  - param_name: "Second Line Minimum Length"
    description: "Type: float (0.1 - no limit).\nMinimum length of the second line to detect [micrometers].\nLower values detect shorter lines.\nHigher values ignore short segments (reduces false detections)."
    type: "float"
    min_val: 0.1
    max_val: "inf"
    default: 0.1
    
  - param_name: "Search Accuracy"
    description: "Type: dropdown.\nPrecision level for line detection.\ncoarse: Fastest, lowest precision (good for rough estimates).\nfine: Balanced speed and precision.\nfinest: Slowest, highest precision.\nmax_limit: Maximum precision (slowest)."
    type: "string_list"
    default: "fine"
    values:
      - "coarse"
      - "fine"
      - "finest"
      - "max_limit"
