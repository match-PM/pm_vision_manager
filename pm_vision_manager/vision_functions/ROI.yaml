function_name: "Region of Interest (ROI)"
description: "Defines and extracts a rectangular region of interest (ROI) from the image based on center offsets and relative size percentages.\n\nOutputs a cropped image containing only the selected region.\n\nUseful for focusing analysis on specific areas and ignoring irrelevant image regions.\n\nDependencies:\n- Works on any image type\n- ROI coordinates are calculated relative to image center\n- Be careful with ROI size to avoid cropping out important features or including irrelevant content"
# image: "vision_functions_example_imgs/ROI.jpg"
function_category: "Image Processing"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "ROI Center X Offset"
    description: "Type: float (-100.0 to 100.0).\nHorizontal offset of ROI center from image center, as percentage of half the image width.\n-100% = left edge, 0% = center, +100% = right edge.\nDefault: 0.0"
    type: "float"
    min_val: -100.0
    max_val: 100.0
    default: 0.0
    
  - param_name: "ROI Center Y Offset"
    description: "Type: float (-100.0 to 100.0).\nVertical offset of ROI center from image center, as percentage of half the image height.\n-100% = top edge, 0% = center, +100% = bottom edge.\nDefault: 0.0"
    type: "float"
    min_val: -100.0
    max_val: 100.0
    default: 0.0

  - param_name: "ROI Height"
    description: "Type: float (1.0 to 100.0).\nHeight of the ROI as percentage of total image height.\nDefault: 50.0 (half the image height)"
    type: "float"
    min_val: 1.0
    max_val: 100.0
    default: 50.0

  - param_name: "ROI Width"
    description: "Type: float (1.0 to 100.0).\nWidth of the ROI as percentage of total image width.\nDefault: 50.0 (half the image width)"
    type: "float"
    min_val: 1.0
    max_val: 100.0
    default: 50.0
