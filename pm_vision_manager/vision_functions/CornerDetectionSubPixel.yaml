function_name: "Corner Detection (Subpixel)"
description: "Detects the intersection point (corner) of two dominant lines in a binary image with subpixel accuracy.\n\nEach line is selected from a specified image edge (top, bottom, left, right).\nUses Hough-based line detection with adjustable search accuracy.\n\nOutputs subpixel-accurate corner coordinates and quality scores.\n\nDependencies:\n- Input MUST be a binary image (black and white)\n- Lines should be clearly visible\n- Use edge detection (like Canny) first if needed"
# image: "vision_functions_example_imgs/CornerDetectionSubPixel.jpg"
function_category: "Machine Vision"

quality_score:
  line1: "Number of detected line segments for the first line"
  line2: "Number of detected line segments for the second line"
  residual_score: "Residual fit quality (0-100, higher is better)"
  inlier_score: "Percentage of inlier points (0-100, higher is better)"
  weakest_score_index: "Index of weakest subscore (0=residual, 1=inliers)"
  weakest_score_action:
    s: "Increase smoothing or increase distance threshold"
    t: "Use finer search accuracy"
    l: "Increase minimum line length"
  angle_degrees: "Angle between lines in degrees"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"
    default: true

  - param_name: "First Line Edge"
    description: "Type: dropdown.\nWhich edge of the image to use for detecting the first line.\ntop: Upper edge\nbottom: Lower edge\nleft: Left edge\nright: Right edge"
    type: "string_list"
    default: "top"
    values:
      - "top"
      - "bottom"
      - "left"
      - "right"

  - param_name: "First Line Minimum Length"
    description: "Type: float (0.1 - no limit).\nMinimum length of segments for the first line detection [micrometers].\nLower values detect shorter lines.\nHigher values ignore short segments."
    type: "float"
    min_val: 0.1
    max_val: "inf"
    default: 0.1

  - param_name: "Second Line Edge"
    description: "Type: dropdown.\nWhich edge of the image to use for detecting the second line.\ntop: Upper edge\nbottom: Lower edge\nleft: Left edge\nright: Right edge"
    type: "string_list"
    default: "top"
    values:
      - "top"
      - "bottom"
      - "left"
      - "right"

  - param_name: "Second Line Minimum Length"
    description: "Type: float (0.1 - no limit).\nMinimum length of segments for the second line detection [micrometers].\nLower values detect shorter lines.\nHigher values ignore short segments."
    type: "float"
    min_val: 0.1
    max_val: "inf"
    default: 0.1
    
  - param_name: "Search Accuracy"
    description: "Type: dropdown.\nPrecision level for line detection.\ncoarse: Fastest, lowest precision.\nfine: Balanced speed and precision (recommended).\nfinest: High precision, slower.\nmax_limit: Maximum precision, slowest."
    type: "string_list"
    default: "fine"
    values:
      - "coarse"
      - "fine"
      - "finest"
      - "max_limit"

  - param_name: "Distance Threshold"
    description: "Type: float (0.1 - 10.0).\nMaximum perpendicular distance from the initial line segment within which edge points are considered inliers for line refinement [pixels].\nSmaller values = stricter line fitting.\nLarger values = more tolerant line fitting."
    type: "float"
    min_val: 0.1
    max_val: 10.0
    default: 1.5

  - param_name: "Minimum Inliers"
    description: "Type: int (1 - 1000).\nMinimum number of inlier points required for a valid line fit.\nHigher values require stronger line evidence.\nLower values may accept weak lines."
    type: "int"
    min_val: 1
    max_val: 1000
    default: 10
