function_name: "AdaptiveThreshold"
description: "Applies adaptive thresholding by computing a threshold for each pixel based on the local neighborhood, then subtracting constant C.\n\nSupports mean or Gaussian weighted methods."
# image: "vision_functions_example_imgs/AdaptiveThreshold.jpg"

function_category: "Image Processing"

params:
  - param_name: "active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "blockSize"
    description: "Type: kernel.\nSize of the pixel neighborhood used to calculate the threshold value.\nMust be an odd number."
    type: "kernel"
    min_val: 3
    max_val: 999

  - param_name: "maxValue"
    description: "Type: float.\nValue assigned to pixels that meet the threshold condition."
    type: "float"
    min_val: 0.0
    max_val: 255.0

  - param_name: "C"
    description: "Type: float.\nConstant subtracted from the mean or weighted mean.\nCan be negative or positive."
    type: "float"
    min_val: "-inf"
    max_val: "inf"

  - param_name: "adaptiveMethod"
    description: "Type: dropdown.\nAdaptive method to use for threshold calculation."
    type: "string_list"
    values: 
      - "ADAPTIVE_THRESH_MEAN_C"
      - "ADAPTIVE_THRESH_GAUSSIAN_C"

  - param_name: "thresholdType"
    description: "Type: dropdown.\nType of thresholding to apply."
    type: "string_list"
    values: 
      - "THRESH_BINARY"
      - "THRESH_BINARY_INV"
