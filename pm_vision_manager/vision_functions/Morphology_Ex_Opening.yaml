function_name: "Morphology Opening"
description: "Performs morphological opening (erosion followed by dilation) to remove small noise and separate connected objects in a binary image.\n\nAny white object or connection thinner than the kernel size will be removed.\n\n**Guidance:**\n1. To remove noise, set kernel size slightly larger than the largest noise particle to eliminate.\n2. To separate objects or detach them from the border, set kernel size larger than the connecting bridge of pixels.\n3. **Warning:** If kernel size is larger than the objects to detect, they will be erased entirely.\n\nTypical kernel sizes for noise removal are small, odd integers like 3, 5, or 7.\n\nDependencies:\n- Input MUST be a binary (black and white) image\n- Output is a binary image with noise removed\n- Use after thresholding to clean up results"
# image: "vision_functions_example_imgs/Morphology_Ex_Opening.jpg"
function_category: "Image Processing"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Kernel Size"
    description: "Type: kernel (1 - 10).\nSize of the square structuring element.\nMust be an odd number.\nLarger values remove larger noise but may erase small objects.\nRecommended: 3, 5, or 7 for noise removal.\nDefault: 1 (no effect)"
    type: "kernel"
    min_val: 1
    max_val: 10
