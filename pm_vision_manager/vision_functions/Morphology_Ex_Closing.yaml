function_name: "Morphology Closing"
description: "Performs morphological closing (dilation followed by erosion) to fill small holes, gaps, and connect nearby objects in a binary image.\n\nAny black hole or gap smaller than the kernel size will be filled or closed.\n\n**Guidance:**\n1. To fill holes within an object, set kernel size slightly larger than the largest hole to fill.\n2. To connect separate parts of an object, set kernel size larger than the gap between them.\n3. **Warning:** If kernel size is too large, it can merge distinct nearby objects, leading to inaccurate contour detection.\n\nTypical kernel sizes for closing small gaps or holes are small, odd integers like 3, 5, or 7.\n\nDependencies:\n- Input MUST be a binary (black and white) image\n- Output is a binary image with holes filled and gaps closed\n- Use before contour detection for cleaner results"
# image: "vision_functions_example_imgs/Morphology_Ex_Closing.jpg"
function_category: "Image Processing"

params:
  - param_name: "Active"
    description: "Enable or disable this function in the pipeline."
    type: "bool"

  - param_name: "Kernel Size"
    description: "Type: kernel (1 - 10).\nSize of the square structuring element.\nMust be an odd number.\nLarger values fill larger holes but may merge objects.\nRecommended: 3, 5, or 7 for small gaps.\nDefault: 1 (no effect)"
    type: "kernel"
    min_val: 1
    max_val: 10
